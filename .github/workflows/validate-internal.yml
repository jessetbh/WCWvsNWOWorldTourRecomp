# Runs the build for pushes to main and same-repo PRs (secrets available directly).
# Fork PRs go through validate-external.yml instead.
name: validate-internal
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]
jobs:
  build:
    if: github.event_name == 'push' || github.repository == github.event.pull_request.head.repo.full_name
    uses: ./.github/workflows/validate.yml
    secrets: inherit
