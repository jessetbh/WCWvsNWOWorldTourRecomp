# Reusable build workflow, adapted from BMHeroRecomp's validate.yml.
# The beta is Windows-only; Linux/macOS/Flatpak jobs from the template were dropped —
# resurrect them from BMHero's validate.yml when those platforms are tackled.
#
# Required repository secrets (fine-grained PAT, Contents: read-only):
#   WCW_CI_PAT   - PAT with read access to this repo, jessetbh/WCWSyms (while private),
#                  and the private ROM repo. Used for submodule checkout + ROM fetch.
#                  Once WCWSyms is public, the main checkout can drop back to the
#                  default token; the ROM fetch always needs the PAT.
#   WCW_ROM_REPO - "<owner>/<repo>" of the private repo holding wcw.z64 at its root.
name: validate
on:
  workflow_call:
    inputs:
      SDL2_VERSION:
        type: string
        required: false
        default: '2.30.3'
      # Upstream N64Recomp commit the local RecompiledFuncs baseline was generated
      # with (N64Recomp/N64Recomp). The runtime's recomp.h comes separately from the
      # jessetbh/N64Recomp fork pinned inside lib/N64ModernRuntime.
      N64RECOMP_COMMIT:
        type: string
        required: false
        default: 'ffb39cdad1da5de07eaaa48bd1db4a89a7986771'
      LLVM_VERSION:
        type: string
        required: false
        default: '19.1.3'
    secrets:
      WCW_CI_PAT:
        required: true
      WCW_ROM_REPO:
        required: true
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        type: [ Release ]
    name: windows (${{ matrix.type }})
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          submodules: recursive
          # PAT needed while the WCWSyms submodule is private (default token can't
          # read sibling private repos).
          token: ${{ secrets.WCW_CI_PAT }}
      - name: ccache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          key: ${{ runner.os }}-wcw-ccache-${{ matrix.type }}
      - name: Install Windows Dependencies
        run: |
          choco install ninja
          Remove-Item -Path "C:\ProgramData\Chocolatey\bin\ccache.exe" -Force -ErrorAction SilentlyContinue
      # The patches build needs a MIPS-capable clang. The llvm.org *installer* builds
      # are trimmed to x86/ARM, but the portable tar.xz release archive ships the full
      # backend set (BMHero CI uses the same artifact).
      - name: Download portable LLVM
        run: |
          $ProgressPreference = 'SilentlyContinue'
          Invoke-WebRequest -Uri "https://github.com/llvm/llvm-project/releases/download/llvmorg-${{ inputs.LLVM_VERSION }}/LLVM-${{ inputs.LLVM_VERSION }}-Windows-X64.tar.xz" -OutFile "LLVM.tar.xz"
          New-Item -ItemType Directory -Path portable-llvm > $null
          7z x LLVM.tar.xz
          7z x LLVM.tar -oportable-llvm
      - name: Configure Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
      - name: Get ROM
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.WCW_ROM_REPO }}
          token: ${{ secrets.WCW_CI_PAT }}
          path: wcw-secret
      - name: Prepare Build
        run: copy .\wcw-secret\wcw.z64 .\
      - name: Build N64Recomp & RSPRecomp
        run: |
          git clone https://github.com/N64Recomp/N64Recomp.git --recurse-submodules N64RecompSource
          cd N64RecompSource
          git checkout ${{ inputs.N64RECOMP_COMMIT }}
          git submodule update --init --recursive
          $cpuCores = (Get-CimInstance -ClassName Win32_Processor).NumberOfLogicalProcessors

          cmake -DCMAKE_BUILD_TYPE=Release -DCMAKE_MAKE_PROGRAM=ninja -G Ninja -S . -B cmake-build
          cmake --build cmake-build --config Release --target N64RecompCLI -j $cpuCores
          cmake --build cmake-build --config Release --target RSPRecomp -j $cpuCores

          cp cmake-build/N64Recomp.exe ..
          cp cmake-build/RSPRecomp.exe ..
      - name: Run N64Recomp & RSPRecomp
        run: |
          ./N64Recomp.exe wcw.toml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
          ./RSPRecomp.exe rsp/wcw_audio.toml
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
      - name: Build WCWRecompiled
        run: |
          $cpuCores = (Get-CimInstance -ClassName Win32_Processor).NumberOfLogicalProcessors

          # Remove Chocolatey LLVM from PATH so VS's clang-cl is used for the port.
          $env:PATH = ($env:PATH -split ';' | Where-Object { $_ -ne 'C:\Program Files\LLVM\bin' }) -join ';'

          $llvm = "$env:GITHUB_WORKSPACE/portable-llvm/LLVM-${{ inputs.LLVM_VERSION }}-Windows-X64/bin" -replace '\\','/'
          cmake -DCMAKE_BUILD_TYPE=${{ matrix.type }} -DCMAKE_CXX_COMPILER_LAUNCHER=ccache -DCMAKE_C_COMPILER_LAUNCHER=ccache -DCMAKE_CXX_COMPILER=clang-cl -DCMAKE_C_COMPILER=clang-cl -DCMAKE_MAKE_PROGRAM=ninja -DPATCHES_C_COMPILER="$llvm/clang" -DPATCHES_LD="$llvm/ld.lld" -G Ninja -S . -B cmake-build
          cmake --build cmake-build --config ${{ matrix.type }} --target WCWRecompiled -j $cpuCores
      - name: Package
        run: |
          New-Item -ItemType Directory -Path package > $null
          Copy-Item cmake-build/WCWRecompiled.exe package/
          Copy-Item -Recurse cmake-build/assets package/assets
          Copy-Item cmake-build/recompcontrollerdb.txt package/
          Copy-Item cmake-build/SDL2.dll, cmake-build/dxil.dll, cmake-build/dxcompiler.dll package/
          Copy-Item COPYING package/
          Copy-Item .github/release-readme.txt package/README.txt
          # App-local VC++ runtime: the exe and the dxc DLLs import MSVCP140/VCRUNTIME140/
          # VCRUNTIME140_1/MSVCP140_ATOMIC_WAIT, which stock Windows does NOT ship (the
          # VC++ Redistributable provides them). Placing them next to the exe makes the
          # zip run on machines without the redist (Windows searches the app dir first;
          # these are not KnownDLLs). Microsoft licenses these files for app-local
          # redistribution.
          $crt = Get-ChildItem "$env:VCToolsRedistDir\x64\Microsoft.VC*.CRT" | Select-Object -First 1
          Copy-Item "$($crt.FullName)\msvcp140.dll", "$($crt.FullName)\vcruntime140.dll", "$($crt.FullName)\vcruntime140_1.dll", "$($crt.FullName)\msvcp140_atomic_wait.dll" package/
      - name: Assert no stray files in package
        run: |
          $stray = Get-ChildItem -Recurse package -Include *.z64,*.n64,*.v64,*.json,*.json.bak,*.map,*.pdb,*.log
          $stray += Get-ChildItem -Recurse -Directory package -Filter saves
          if ($stray) { $stray | ForEach-Object { Write-Host "STRAY: $($_.FullName)" }; exit 1 }
          Write-Host "package is clean"
      - name: Archive WCWRecompiled
        uses: actions/upload-artifact@v4
        with:
          name: WCWRecompiled-${{ runner.os }}-${{ matrix.type }}
          path: package/*
      - name: Archive Debug Files
        uses: actions/upload-artifact@v4
        with:
          name: WCWRecompiled-DebugSyms-${{ matrix.type }}
          path: |
            cmake-build/WCWRecompiled.map
            cmake-build/WCWRecompiled.pdb
          if-no-files-found: warn
